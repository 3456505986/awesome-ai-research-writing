<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awesome AI Research Writing — 学术写作 Prompt & Skills 资源库</title>
  <meta name="description" content="顶尖研究机构的学术写作 Prompt 模板库与 Agent Skills 教程，让 AI 写作更好更高效">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #faf9f6;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #555;
      --border: #e5e0d8;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --code-bg: #f3f2ef;
      --tag-bg: #eef2ff;
      --tag-text: #4338ca;
      --sidebar-width: 260px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-width);
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      background: var(--card-bg);
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      overflow-y: auto;
      z-index: 10;
    }

    #sidebar .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    #sidebar .subtitle {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    #sidebar nav a {
      display: block;
      padding: 6px 10px;
      font-size: 0.84rem;
      color: var(--text);
      text-decoration: none;
      border-radius: 6px;
      margin-bottom: 2px;
      transition: background 0.15s;
    }

    #sidebar nav a:hover,
    #sidebar nav a.active {
      background: var(--tag-bg);
      color: var(--tag-text);
    }

    #sidebar nav .section-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-secondary);
      margin: 18px 0 6px 6px;
    }

    /* ── Main ── */
    #main {
      margin-left: var(--sidebar-width);
      flex: 1;
      max-width: 900px;
      padding: 40px 48px 80px;
      min-width: 0;
    }

    /* ── Typography ── */
    #content h1 {
      font-size: 2rem;
      font-weight: 800;
      margin: 0.5em 0 0.3em;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }
    #content h2 {
      font-size: 1.45rem;
      font-weight: 700;
      margin: 2em 0 0.6em;
      padding-bottom: 0.35em;
      border-bottom: 2px solid var(--border);
    }
    #content h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 1.6em 0 0.5em;
    }
    #content h4 {
      font-size: 1rem;
      font-weight: 600;
      margin: 1.3em 0 0.4em;
    }
    #content p { margin: 0.8em 0; }
    #content a { color: var(--accent); text-decoration: none; }
    #content a:hover { text-decoration: underline; }

    #content blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 18px;
      margin: 1.2em 0;
      background: var(--tag-bg);
      border-radius: 0 8px 8px 0;
      color: var(--tag-text);
    }

    #content blockquote p { margin: 0.4em 0; }

    /* Code */
    #content code {
      background: var(--code-bg);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "SF Mono", Consolas, monospace;
    }

    #content pre {
      background: var(--code-bg);
      padding: 18px 22px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 1.2em 0;
      border: 1px solid var(--border);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    #content pre code {
      background: none;
      padding: 0;
      font-size: inherit;
    }

    /* Lists */
    #content ul, #content ol { padding-left: 1.8em; margin: 0.6em 0; }
    #content li { margin: 0.3em 0; }

    /* Tables */
    #content table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.2em 0;
      font-size: 0.92rem;
    }
    #content th, #content td {
      border: 1px solid var(--border);
      padding: 10px 14px;
      text-align: left;
    }
    #content th {
      background: var(--code-bg);
      font-weight: 600;
    }

    /* Images */
    #content img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin: 1em 0;
    }

    /* Horizontal rule */
    #content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

    /* Tags / chips in links */
    #content a:has(code) { display: inline; }

    /* ── Top hero banner for the first blockquote ── */
    #content > blockquote:first-child {
      background: linear-gradient(135deg, #eef2ff 0%, #faf9f6 100%);
      border-left-color: var(--accent);
      font-size: 1.05rem;
      padding: 16px 22px;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      #sidebar {
        width: 100%;
        height: auto;
        position: relative;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 16px;
      }
      #sidebar nav { display: flex; flex-wrap: wrap; gap: 4px; }
      #sidebar nav a { font-size: 0.78rem; padding: 4px 8px; }
      #sidebar nav .section-title { display: none; }
      #main {
        margin-left: 0;
        padding: 20px 18px 60px;
      }
      #content h1 { font-size: 1.5rem; }
      #content h2 { font-size: 1.2rem; }
    }

    @media (max-width: 480px) {
      #main { padding: 14px 12px 40px; }
    }

    /* Loading */
    #loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }
    #loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside id="sidebar">
  <div class="logo">📝 Awesome AI<br>Research Writing</div>
  <div class="subtitle">让 AI 写作更好更高效</div>
  <nav id="sidebar-nav">
    <div class="section-title">导航</div>
  </nav>
</aside>

<!-- ── Main content ── -->
<main id="main">
  <div id="loading">
    <div class="spinner"></div>
    <p>正在加载内容…</p>
  </div>
  <div id="content"></div>
</main>

<script>
(async function() {
  const contentEl = document.getElementById('content');
  const loadingEl = document.getElementById('loading');
  const sidebarNav = document.getElementById('sidebar-nav');

  try {
    // Fetch README.md from repo root
    const resp = await fetch('README.md');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    let md = await resp.text();


    // Configure marked
    marked.setOptions({
      breaks: false,
      gfm: true,
    });

    let html = marked.parse(md);

    // Wrap all headings with id so they can be linked
    const temp = document.createElement('div');
    temp.innerHTML = html;

    // Generate sidebar from headings
    const headings = temp.querySelectorAll('h1, h2, h3');
    let sidebarHTML = '<div class="section-title">导航</div>';

    headings.forEach((h, i) => {
      // Generate id from text content
      const text = h.textContent.trim();
      const id = text
        .toLowerCase()
        .replace(/[^\w一-鿿]+/g, '-')
        .replace(/^-+|-+$/g, '')
        || `heading-${i}`;
      h.id = id;

      // Add to sidebar
      const indent = h.tagName === 'H3' ? ' style="padding-left:18px;font-size:0.78rem;"' :
                     h.tagName === 'H2' ? '' :
                     ' style="font-weight:700;"';
      const displayText = text.length > 28 ? text.slice(0, 28) + '…' : text;
      sidebarHTML += `<a href="#${id}"${indent}>${displayText}</a>`;

      // Add section dividers before Part I and Part II
      if (text.includes('Part I')) {
        sidebarHTML = sidebarHTML.replace(
          `<a href="#${id}"${indent}>${displayText}</a>`,
          `<div class="section-title">📝 Prompts</div><a href="#${id}"${indent}>${displayText}</a>`
        );
      }
      if (text.includes('Part II')) {
        sidebarHTML = sidebarHTML.replace(
          `<a href="#${id}"${indent}>${displayText}</a>`,
          `<div class="section-title">🤖 Skills</div><a href="#${id}"${indent}>${displayText}</a>`
        );
      }
    });

    sidebarNav.innerHTML = sidebarHTML;

    // Render final HTML
    contentEl.innerHTML = temp.innerHTML;
    loadingEl.style.display = 'none';

    // Highlight current section in sidebar on scroll
    const navLinks = sidebarNav.querySelectorAll('a');
    const headingElements = contentEl.querySelectorAll('h1, h2, h3');

    function updateActiveLink() {
      let current = '';
      headingElements.forEach(h => {
        const rect = h.getBoundingClientRect();
        if (rect.top < 120) current = h.id;
      });
      navLinks.forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === `#${current}`);
      });
    }

    window.addEventListener('scroll', updateActiveLink, { passive: true });

    // Smooth scroll for sidebar links
    sidebarNav.addEventListener('click', (e) => {
      const link = e.target.closest('a');
      if (!link || !link.hash) return;
      e.preventDefault();
      const target = document.getElementById(link.hash.slice(1));
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

  } catch (err) {
    contentEl.innerHTML = `
      <div style="text-align:center;padding:80px 20px;">
        <h2>⚠️ 加载失败</h2>
        <p style="color:var(--text-secondary);">无法加载 README.md</p>
        <p style="font-size:0.85rem;color:var(--text-secondary);">${err.message}</p>
        <p style="margin-top:20px;">
          <a href="https://github.com/3456505986/awesome-ai-research-writing/blob/main/README.md" style="color:var(--accent);">直接查看 README.md →</a>
        </p>
      </div>`;
    loadingEl.style.display = 'none';
  }
})();
</script>

</body>
</html>
